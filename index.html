<!DOCTYPE html>
<html lang="en" x-data>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam</title>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    position:relative;
}

.bg{
    position:fixed;
    inset:0;
    background:url("adam.png") center center/cover no-repeat;
}

.overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle at center,
        transparent 45%,
        rgba(180,0,0,.35) 70%,
        rgba(0,0,0,.95) 100%);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
}

.vignette{
    position:fixed;
    inset:-80px;
    pointer-events:none;
    box-shadow:
        inset 0 0 220px rgba(0,0,0,.95),
        inset 0 0 150px rgba(255,0,0,.35);
    filter:blur(35px);
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="vignette"></div>

<audio id="bgm" autoplay loop preload="auto">
    <source src="adam.mp3" type="audio/mpeg">
</audio>

<script>
const bgm = document.getElementById("bgm");

bgm.volume = 1;

window.addEventListener("load", () => {
    bgm.play().catch(() => {});
});

document.addEventListener("DOMContentLoaded", () => {
    bgm.play().catch(() => {});
});

setInterval(() => {
    if (bgm.paused) {
        bgm.play().catch(() => {});
    }
}, 1000);
</script>

</body>
</html>
